<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Категорії</title>
  <style>
    /* 1. СТАТИЧНИЙ ТА ЗАТЕМНЕНИЙ ФОН */
    body {
      margin: 0;
      padding: 0;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      color: #ffffff;
      background-color: #0d0d0d;
      
      /* Додаємо оверлей 40% затемнення (rgba 0,0,0,0.4) поверх зображення */
      background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('your-background-image.jpg');
      
      background-size: cover;
      background-position: center;
      
      /* Головне фіксування: фон залишається на місці при скролі */
      background-attachment: fixed; 
      background-repeat: no-repeat;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 80px 24px;
    }

    header {
      text-align: center;
      margin-bottom: 60px;
    }

    header h1 {
      font-size: 2.5rem;
      font-weight: 300;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    /* 2. ОПТИМІЗАЦІЯ ДИЗАЙНУ ТА ЛОГІКИ КАТЕГОРІЙ */
    /* Використовуємо CSS Grid для чіткої архітектурної структури */
    .categories-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .category-card {
      position: relative;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 40px 30px;
      text-decoration: none;
      color: #ffffff;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 200px;
    }

    /* Ефект при наведенні (Hover) — картка стає активнішою, але стримано */
    .category-card:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.3);
      transform: translateY(-4px);
    }

    /* Номер чи індекс категорії для кращої візуальної логіки навігації */
    .category-number {
      font-size: 0.85rem;
      font-family: monospace;
      color: rgba(255, 255, 255, 0.4);
      margin-bottom: 30px;
    }

    .category-title {
      font-size: 1.5rem;
      font-weight: 400;
      letter-spacing: 1px;
      margin: 0 0 8px 0;
    }

    .category-desc {
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.6);
      margin: 0;
      line-height: 1.5;
    }

    /* Стрілка-індикатор, яка м'яко висувається при наведенні */
    .category-arrow {
      position: absolute;
      bottom: 30px;
      right: 30px;
      font-size: 1.2rem;
      opacity: 0.3;
      transform: translateX(0);
      transition: all 0.3s ease;
    }

    .category-card:hover .category-arrow {
      opacity: 1;
      transform: translateX(6px);
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>Категорії проектів</h1>
    </header>

    <main class="categories-grid">
      <!-- Картка 1 -->
      <a href="#" class="category-card">
        <div class="category-number">01 //</div>
        <div>
          <h2 class="category-title">Архітектура</h2>
          <p class="category-desc">Форма, простір та об'єм у сучасних концептах.</p>
        </div>
        <span class="category-arrow">→</span>
      </a>

      <!-- Картка 2 -->
      <a href="#" class="category-card">
        <div class="category-number">02 //</div>
        <div>
          <h2 class="category-title">Айдентика</h2>
          <p class="category-desc">Мінімалістичні візуальні системи та типографіка.</p>
        </div>
        <span class="category-arrow">→</span>
      </a>

      <!-- Картка 3 -->
      <a href="#" class="category-card">
        <div class="category-number">03 //</div>
        <div>
          <h2 class="category-title">Дизайн інтер'єру</h2>
          <p class="category-desc">Ергономіка, текстури та монохромна естетика.</p>
        </div>
        <span class="category-arrow">→</span>
      </a>
    </main>
  </div>

</body>
</html>
