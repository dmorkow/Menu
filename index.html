<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Меню — Парк Історії Землі</title>

  <style>
    :root {
      --bg: #0f0f0d;
      --wood-1: #171411;
      --wood-2: #201b16;
      --panel: rgba(18, 18, 16, 0.24);
      --text: #f7f3ea;
      --muted: #b9b1a4;
      --accent: #f2a300;
      --accent-2: #ffc44a;
      --line: rgba(242, 163, 0, 0.26);
      --radius: 24px;
      --shadow: 0 10px 24px rgba(0, 0, 0, 0.16);
      --max: 620px;
      --page-bg-image: none;
    }

    * { box-sizing: border-box; }


    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      overflow-x: hidden;
    }

    /* СТАТИЧНИЙ ФОН ІЗ ЧОРНИМ ЗАТЕМНЕННЯМ 20% */
    .main-bg {
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;
      background-color: var(--bg);
      background-image:
        linear-gradient(rgba(0,0,0,0.20), rgba(0,0,0,0.20)),
        var(--page-bg-image);
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
    }

    body::before {
      content: none;
    }

    button { font: inherit; }

    .page {
      width: min(var(--max), calc(100% - 18px));
      margin: 0 auto;
      padding: 10px 0 calc(72px + env(safe-area-inset-bottom));
    }

    .hero {
      position: relative;
      overflow: hidden;
      padding: 18px 18px 16px;
      border-radius: 26px;
      background:
        radial-gradient(circle at 12% 0%, rgba(242,163,0,.12), transparent 34%),
        linear-gradient(180deg, rgba(255,255,255,.045), rgba(0,0,0,.08)),
        rgba(12,12,11,.24);
      border: 1px solid rgba(255,255,255,.08);
      box-shadow: var(--shadow);
      text-align: center;
    }

    .hero::before { display: none; }

    .hero-kicker {
      margin: 0 0 6px;
      color: var(--accent);
      font-size: 11px;
      line-height: 1.1;
      letter-spacing: .24em;
      text-transform: uppercase;
      font-weight: 800;
    }

    .hero-title {
      position: relative;
      z-index: 1;
      margin: 0;
      font-size: clamp(42px, 14vw, 74px);
      line-height: .9;
      font-weight: 900;
      letter-spacing: .09em;
      text-transform: uppercase;
    }

    .hero-note {
      margin: 10px auto 0;
      max-width: 320px;
      color: rgba(247,243,234,.68);
      font-size: 12px;
      line-height: 1.45;
    }

    .toolbar-wrap {
      position: sticky;
      top: 0;
      z-index: 20;
      margin: 10px -9px 0;
      padding: 10px 9px 9px;
      background: linear-gradient(180deg, rgba(12,12,11,.46), rgba(12,12,11,.22));
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255,255,255,.045);
    }

    .category-scroll {
      display: grid;
      grid-template-columns: 34px 1fr 34px;
      gap: 7px;
      align-items: center;
    }

    .scroll-btn {
      width: 34px;
      height: 34px;
      border: 1px solid rgba(242,163,0,.36);
      border-radius: 50%;
      background: rgba(255,255,255,.07);
      color: var(--accent);
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
      display: grid;
      place-items: center;
    }

    .tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
      scroll-behavior: smooth;
      scroll-snap-type: x proximity;
      padding: 1px 0;
    }

    .tabs::-webkit-scrollbar { display: none; }

    .tab {
      flex: 0 0 auto;
      scroll-snap-align: start;
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 999px;
      background: rgba(255,255,255,.075);
      color: var(--text);
      padding: 10px 14px;
      cursor: pointer;
      font-size: 13px;
      line-height: 1.15;
      white-space: nowrap;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
    }

    .tab.active {
      background: var(--accent);
      color: #17130a;
      border-color: var(--accent);
      font-weight: 800;
    }

    .status {
      display: flex;
      justify-content: space-between;
      gap: 8px 12px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      margin: 12px 2px 2px;
    }

    .status strong { color: var(--text); }

    .category {
      margin-top: 26px;
      scroll-margin-top: 94px;
    }

    .category-head {
      display: flex;
      justify-content: flex-start;
      align-items: flex-start;
      gap: 10px;
      padding: 0 2px 10px;
      margin-bottom: 12px;
      border-bottom: 1px solid var(--line);
    }

    .category-title {
      margin: 0;
      color: var(--accent);
      font-size: clamp(24px, 8vw, 38px);
      line-height: 1.08;
      text-transform: uppercase;
      letter-spacing: .055em;
      font-weight: 900;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 13px;
    }

    .item {
      --inner-width: 80%;
      position: relative;
      display: grid;
      grid-template-columns: 1fr;
      gap: 17px;
      align-items: start;
      justify-items: center;
      min-height: auto;
      padding: 30px 22px 42px;
      border-radius: 30px;
      border: 1px solid rgba(255,255,255,.12);
      background:
        radial-gradient(circle at 100% 0%, rgba(242,163,0,.045), transparent 28%),
        linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,.008) 42%),
        var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(1.5px);
      -webkit-backdrop-filter: blur(1.5px);
    }

    .item.no-photo {
      grid-template-columns: 1fr;
      min-height: auto;
      padding: 30px 22px 42px;
    }

    .top-mark {
      width: var(--inner-width);
      min-height: 24px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      justify-self: center;
      margin: 0 0 2px;
    }

    .dots {
      display: flex;
      gap: 4px;
      margin: 0;
    }

    .dots i {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      display: block;
      background: var(--accent);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      min-height: 24px;
      border-radius: 999px;
      background: var(--accent);
      color: #17130a;
      padding: 6px 10px;
      font-size: 10px;
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: .05em;
      font-weight: 900;
      box-shadow: 0 6px 16px rgba(242,163,0,.18);
    }

    .photo-wrap {
      width: var(--inner-width);
      aspect-ratio: 1 / 1;
      height: auto;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid var(--accent);
      background:
        radial-gradient(circle at 30% 25%, #5b5b5b, #2b2b2b 60%, #151515 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 10px 28px rgba(0,0,0,.42);
    }

    .photo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .photo-placeholder {
      color: rgba(255,255,255,.78);
      text-align: center;
      font-size: 12px;
      line-height: 1.35;
      padding: 10px;
    }

    .item-content {
      width: var(--inner-width);
      min-width: 0;
      max-width: none;
      padding-right: 0;
      justify-self: center;
    }

    .item.no-photo .item-content {
      width: var(--inner-width);
      max-width: none;
      padding-right: 0;
    }

    .item-title {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
      font-weight: 850;
      letter-spacing: .01em;
    }

    .item-desc {
      max-width: 100%;
      margin: 8px 0 14px;
      color: #d8d2c8;
      font-size: 13px;
      line-height: 1.55;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 9px 14px;
      align-items: baseline;
      line-height: 1.25;
    }

    .weight {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.3;
    }

    .price {
      color: #fff;
      font-size: 22px;
      line-height: 1.05;
      font-weight: 900;
      white-space: nowrap;
    }

    .empty,
    .error-box {
      margin-top: 16px;
      padding: 24px 18px;
      border-radius: 22px;
      text-align: center;
      color: var(--muted);
      background: rgba(0,0,0,.28);
      border: 1px dashed rgba(255,255,255,.16);
      line-height: 1.45;
    }

    .error-box strong { color: var(--accent); }

    .top-btn {
      position: fixed;
      right: 14px;
      bottom: calc(14px + env(safe-area-inset-bottom));
      z-index: 40;
      width: 46px;
      height: 46px;
      border: 0;
      border-radius: 50%;
      background: var(--accent);
      color: #17130a;
      font-size: 21px;
      cursor: pointer;
      display: none;
      box-shadow: var(--shadow);
    }

    .top-btn.visible { display: block; }

    @media (max-width: 430px) {
      :root {
        --panel: rgba(18, 18, 16, 0.16);
      }

      .hero {
        background:
          radial-gradient(circle at 12% 0%, rgba(242,163,0,.10), transparent 34%),
          linear-gradient(180deg, rgba(255,255,255,.035), rgba(0,0,0,.06)),
          rgba(12,12,11,.18);
      }

      .toolbar-wrap {
        background: linear-gradient(180deg, rgba(12,12,11,.38), rgba(12,12,11,.16));
      }

      .item {
        border: 1px solid rgba(255,255,255,.10);
        background:
          radial-gradient(circle at 100% 0%, rgba(242,163,0,.035), transparent 28%),
          linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,.006) 42%),
          var(--panel);
        backdrop-filter: blur(1px);
        -webkit-backdrop-filter: blur(1px);
      }

      .page { width: min(100% - 14px, var(--max)); }

      .item {
        --inner-width: 80%;
        gap: 16px;
        padding: 30px 20px 42px;
      }

      .item.no-photo {
        padding: 30px 20px 42px;
      }
    }

    @media (max-width: 360px) {
      .item-title { font-size: 18px; }
      .item-desc { font-size: 12.5px; line-height: 1.5; }
      .price { font-size: 20px; }
    }
  </style>
</head>
<body>
  <!-- НОВИЙ ЕЛЕМЕНТ ФОНУ -->
  <div class="main-bg"></div>

  <main class="page">
    <section class="hero" id="top">
      <p class="hero-kicker">Парк Історії Землі</p>
      <h1 class="hero-title">МЕНЮ</h1>
      <p class="hero-note">Оберіть категорію та перегляньте актуальні позиції</p>
    </section>

    <div class="toolbar-wrap">
      <div class="category-scroll">
        <button class="scroll-btn" id="catLeft" type="button" aria-label="Категорії вліво">‹</button>
        <nav class="tabs" id="tabs" aria-label="Категорії меню"></nav>
        <button class="scroll-btn" id="catRight" type="button" aria-label="Категорії вправо">›</button>
      </div>
    </div>

    <div class="status" id="status">
      <span>Завантаження меню...</span>
    </div>

    <section id="menuRoot"></section>
  </main>

  <button class="top-btn" id="topBtn" type="button" aria-label="Нагору">↑</button>

  <script>
    const SHEET_ID = "1GZerl_j73IJE7HO3VSS1w3PXCdqSjvjRkjtlyrNdJ0Q";
    const SHEET_GID = "0";
    const NO_PHOTO_CATEGORIES = ["міцний алкоголь", "міцні напої"];

    const PHOTO_VISIBILITY_COLUMN = "Показувати фото";
    const PAGE_BACKGROUND_COLUMN = "Фон сторінки";

    const state = {
      items: [],
      filtered: [],
      categories: [],
      activeCategory: "Усе",
      updatedAt: null
    };

    const els = {
      tabs: document.getElementById("tabs"),
      menuRoot: document.getElementById("menuRoot"),
      status: document.getElementById("status"),
      topBtn: document.getElementById("topBtn"),
      catLeft: document.getElementById("catLeft"),
      catRight: document.getElementById("catRight")
    };

    function loadGoogleSheet() {
      return new Promise((resolve, reject) => {
        const previousGoogle = window.google;
        const script = document.createElement("script");
        const timeout = window.setTimeout(() => {
          cleanup();
          reject(new Error("Google Sheets довго не відповідає"));
        }, 12000);

        function cleanup() {
          window.clearTimeout(timeout);
          script.remove();
          if (previousGoogle === undefined) {
            try { delete window.google; } catch (e) { window.google = undefined; }
          } else {
            window.google = previousGoogle;
          }
        }

        window.google = window.google || {};
        window.google.visualization = window.google.visualization || {};
        window.google.visualization.Query = {
          setResponse: data => {
            cleanup();
            if (!data || data.status === "error") {
              const message = data?.errors?.[0]?.detailed_message || data?.errors?.[0]?.message || "Помилка читання таблиці";
              reject(new Error(message));
              return;
            }
            resolve(data);
          }
        };

        script.onerror = () => {
          cleanup();
          reject(new Error("Не вдалося підключитися до Google Sheets"));
        };

        script.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?gid=${SHEET_GID}&tqx=out:json&_=${Date.now()}`;
        document.head.appendChild(script);
      });
    }

    function tableToRows(table) {
      const headers = table.cols.map((col, index) => String(col.label || col.id || `Колонка ${index + 1}`).trim());
      return table.rows.map(row => {
        const object = {};
        headers.forEach((header, index) => {
          const cell = row.c[index];
          object[header] = cell ? (cell.f ?? cell.v ?? "") : "";
        });
        return object;
      });
    }

    function getValue(row, names) {
      for (const name of names) {
        if (Object.prototype.hasOwnProperty.call(row, name)) {
          return String(row[name] ?? "").trim();
        }
      }
      return "";
    }

    function normalize(row, index) {
      return {
        category: getValue(row, ["Категорія", "Category", "Розділ"]) || "Інше",
        name: getValue(row, ["Назва", "Name", "Позиція"]),
        description: getValue(row, ["Опис", "Description", "Склад"]),
        weight: getValue(row, ["Вага", "Об'єм", "Обєм", "Weight", "Volume"]),
        price: formatPrice(getValue(row, ["Ціна", "Price", "Вартість"])),
        photo: getValue(row, ["Фото", "Photo", "Image", "Зображення"]),
        status: getValue(row, ["Статус", "Status", "Активно"]).toLowerCase(),
        badgeText: getBadgeText(row),
        order: Number(String(getValue(row, ["Порядок", "Order", "Сортування"])).replace(",", ".")) || index + 1,
        showPhoto: getPhotoVisibility(row)
      };
    }

    function getBadgeText(row) {
      const directBadge = getValue(row, ["Позначка", "Бейдж", "Мітка", "Label", "Badge"]);
      if (directBadge) return directBadge;

      const popular = getValue(row, ["Популярне", "Popular", "Хіт"]);
      if (!popular) return "";

      const normalized = popular.toLowerCase();
      if (["ні", "нет", "no", "false", "0", "hidden", "inactive", "вимкнено", "off"].includes(normalized)) return "";
      if (["так", "yes", "1", "true", "+"].includes(normalized)) return "Хіт";
      return popular;
    }

    function getPhotoVisibility(row) {
      const value = getValue(row, [PHOTO_VISIBILITY_COLUMN, "Фото показувати", "Показувати", "Show photo", "ShowPhoto"]);
      if (!value) return true;
      return !["ні", "нет", "no", "false", "0", "hidden", "inactive", "вимкнено", "off"].includes(value.toLowerCase());
    }

    function getPageBackground(rows) {
      for (const row of rows) {
        const value = getValue(row, [PAGE_BACKGROUND_COLUMN, "Фон", "Фонове зображення", "Background", "Background image"]);
        if (value) return value;
      }
      return "";
    }

    function applyPageBackground(url) {
      const imageUrl = getImageUrl(url);
      if (!imageUrl) {
        document.documentElement.style.setProperty("--page-bg-image", "none");
        return;
      }

      document.documentElement.style.setProperty("--page-bg-image", `url("${imageUrl.replaceAll('"', "%22")}")`);
    }

    function getImageUrl(url) {
      const raw = String(url || "").trim();
      if (!raw) return "";

      const driveMatch = raw.match(/drive\.google\.com\/file\/d\/([^/]+)/) || raw.match(/[?&]id=([^&]+)/);
      if (driveMatch && driveMatch[1]) {
        return `https://drive.google.com/thumbnail?id=${driveMatch[1]}&sz=w1000`;
      }

      return raw;
    }

    function formatPrice(value) {
      const raw = String(value || "").trim();
      if (!raw) return "";
      if (/грн|₴|uah/i.test(raw)) return raw;
      return raw + " грн";
    }

    async function loadMenu() {
      try {
        setStatus("Завантаження меню...");
        els.menuRoot.innerHTML = "";

        const data = await loadGoogleSheet();
        const rows = tableToRows(data.table);
        applyPageBackground(getPageBackground(rows));

        const items = rows
          .map(normalize)
          .filter(item => item.name)
          .filter(item => !["ні", "нет", "no", "false", "0", "hidden", "inactive", "вимкнено"].includes(item.status))
          .sort((a, b) => a.order - b.order || a.name.localeCompare(b.name, "uk"));

        state.items = items;
        state.categories = getCategoriesFromRows(items);
        state.activeCategory = state.categories.includes(state.activeCategory) ? state.activeCategory : "Усе";
        state.updatedAt = new Date();

        render();
      } catch (error) {
        console.error(error);
        setStatus("Не вдалося завантажити меню.");
        els.menuRoot.innerHTML = `
          <div class="error-box">
            <strong>Меню не завантажилось.</strong><br>
            Перевір доступ до таблиці і назви колонок.
          </div>
        `;
      }
    }

    function getCategoriesFromRows(items) {
      const categories = [];
      items.forEach(item => {
        const category = String(item.category || "Інше").trim();
        if (category && !categories.includes(category)) categories.push(category);
      });
      return ["Усе", ...categories];
    }

    function setStatus(text) {
      els.status.innerHTML = `<span>${escapeHTML(text)}</span>`;
    }

    function applyFilters() {
      state.filtered = state.items.filter(item => {
        return state.activeCategory === "Усе" || item.category === state.activeCategory;
      });
    }

    function render() {
      applyFilters();
      renderTabs();
      renderStatus();
      renderMenu();
    }

    function renderTabs() {
      els.tabs.innerHTML = state.categories.map(category => `
        <button class="tab ${category === state.activeCategory ? "active" : ""}" type="button" data-category="${escapeAttr(category)}">
          ${escapeHTML(category)}
        </button>
      `).join("");
    }

    function renderStatus() {
      const time = state.updatedAt
        ? state.updatedAt.toLocaleString("uk-UA", { dateStyle: "short", timeStyle: "short" })
        : "—";

      els.status.innerHTML = `
        <span><strong>${state.filtered.length}</strong> з ${state.items.length} позицій</span>
        <span>Оновлено: ${time}</span>
      `;
    }

    function renderMenu() {
      if (!state.filtered.length) {
        els.menuRoot.innerHTML = `<div class="empty">Нічого не знайдено.</div>`;
        return;
      }

      const grouped = groupByCategory(state.filtered);

      els.menuRoot.innerHTML = Object.entries(grouped).map(([category, items]) => `
        <section class="category" id="cat-${slug(category)}">
          <div class="category-head">
            <h2 class="category-title">${escapeHTML(category)}</h2>
          </div>
          <div class="grid">
            ${items.map(renderItem).join("")}
          </div>
        </section>
      `).join("");
    }

    function renderItem(item) {
      const categoryAllowsPhoto = !NO_PHOTO_CATEGORIES.includes(String(item.category || "").trim().toLowerCase());
      const showPhoto = categoryAllowsPhoto && item.showPhoto;
      const topMark = item.badgeText
        ? `<div class="badge">${escapeHTML(item.badgeText)}</div>`
        : `<div class="dots"><i></i><i></i><i></i></div>`;

      return `
        <article class="item ${showPhoto ? "" : "no-photo"}">
          <div class="top-mark">${topMark}</div>

          ${showPhoto ? `
            <div class="photo-wrap">
              ${item.photo
                ? `<img src="${escapeAttr(getImageUrl(item.photo))}" alt="${escapeAttr(item.name)}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=&quot;photo-placeholder&quot;>Фото<br>страви</div>'">`
                : `<div class="photo-placeholder">Фото<br>страви</div>`
              }
            </div>
          ` : ""}

          <div class="item-content">
            <h3 class="item-title">${escapeHTML(item.name)}</h3>
            ${item.description ? `<p class="item-desc">${escapeHTML(item.description)}</p>` : ""}
            <div class="meta">
              ${item.weight ? `<span class="weight">${escapeHTML(item.weight)}</span>` : ""}
              ${item.price ? `<span class="price">${escapeHTML(item.price)}</span>` : ""}
            </div>
          </div>
        </article>
      `;
    }

    function groupByCategory(items) {
      return items.reduce((acc, item) => {
        if (!acc[item.category]) acc[item.category] = [];
        acc[item.category].push(item);
        return acc;
      }, {});
    }

    function slug(value) {
      return String(value)
        .toLowerCase()
        .trim()
        .replace(/[^a-zа-яіїєґ0-9]+/gi, "-")
        .replace(/^-+|-+$/g, "");
    }

    function escapeHTML(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttr(value) {
      return escapeHTML(value).replaceAll("`", "&#096;");
    }

    els.tabs.addEventListener("click", event => {
      const button = event.target.closest(".tab");
      if (!button) return;
      state.activeCategory = button.dataset.category;
      render();
      button.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
      window.scrollTo({
        top: document.querySelector(".toolbar-wrap").offsetTop,
        behavior: "smooth"
      });
    });

    els.tabs.addEventListener("wheel", event => {
      if (Math.abs(event.deltaY) > Math.abs(event.deltaX)) {
        event.preventDefault();
        els.tabs.scrollLeft += event.deltaY;
      }
    }, { passive: false });

    els.catLeft.addEventListener("click", () => {
      els.tabs.scrollBy({ left: -260, behavior: "smooth" });
    });

    els.catRight.addEventListener("click", () => {
      els.tabs.scrollBy({ left: 260, behavior: "smooth" });
    });

    els.topBtn.addEventListener("click", () => {
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    window.addEventListener("scroll", () => {
      els.topBtn.classList.toggle("visible", window.scrollY > 420);
    });

    loadMenu();
  </script>
</body>
</html>
