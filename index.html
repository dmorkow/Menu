<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Меню — Парк Історії Землі</title>

  <style>
    :root {
      --bg: #141414;
      --panel: rgba(18, 18, 18, 0.92);
      --text: #f5f5f5;
      --muted: #b8b8b8;
      --accent: #f2a300;
      --line: rgba(242, 163, 0, 0.28);
      --radius: 22px;
      --shadow: 0 14px 34px rgba(0,0,0,.34);
      --max: 980px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      background:
        linear-gradient(rgba(16,16,16,.83), rgba(10,10,10,.94)),
        url("https://images.unsplash.com/photo-1515443961218-a51367888e4b?auto=format&fit=crop&w=1800&q=80") center/cover fixed;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      opacity: 0.18;
      background:
        repeating-linear-gradient(90deg, rgba(255,255,255,.03) 0 1px, transparent 1px 80px),
        repeating-linear-gradient(0deg, rgba(255,255,255,.015) 0 1px, transparent 1px 8px);
      mix-blend-mode: soft-light;
    }

    button {
      font: inherit;
    }

    .page {
      width: min(var(--max), calc(100% - 20px));
      margin: 0 auto;
      padding: 12px 0 64px;
    }

    /* МЕНША ШАПКА */
    .hero {
      position: relative;
      overflow: hidden;
      text-align: center;
      padding: 18px 16px 16px;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(0,0,0,.18), rgba(0,0,0,.42));
      border: 1px solid rgba(255,255,255,.06);
      box-shadow: var(--shadow);
    }

    .hero::before {
      display: none;
    }

    .hero-title {
      position: relative;
      z-index: 1;
      margin: 0;
      font-size: clamp(28px, 7vw, 56px);
      line-height: .95;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .hero-subtitle {
      position: relative;
      z-index: 1;
      margin: 8px 0 0;
      font-size: clamp(14px, 2.6vw, 20px);
      color: #ededed;
      font-weight: 500;
    }

    .toolbar-wrap {
      position: sticky;
      top: 0;
      z-index: 20;
      margin-top: 12px;
      padding: 10px 0 10px;
      background: linear-gradient(180deg, rgba(14,14,14,.98), rgba(14,14,14,.78));
      backdrop-filter: blur(10px);
    }

    .tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 2px;
    }

    .tabs::-webkit-scrollbar {
      display: none;
    }

    .tab {
      flex: 0 0 auto;
      border: 1px solid rgba(255,255,255,.09);
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      color: var(--text);
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
      white-space: nowrap;
    }

    .tab.active {
      background: var(--accent);
      color: #171717;
      border-color: var(--accent);
      font-weight: 700;
    }

    .status {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 14px;
      margin: 14px 0 6px;
    }

    .status strong {
      color: var(--text);
    }

    .category {
      margin-top: 28px;
      scroll-margin-top: 105px;
    }

    .category-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 12px;
      padding-bottom: 10px;
      margin-bottom: 14px;
      border-bottom: 1px solid var(--line);
    }

    .category-title {
      margin: 0;
      color: var(--accent);
      font-size: clamp(24px, 5vw, 44px);
      line-height: .95;
      text-transform: uppercase;
      letter-spacing: .06em;
      font-weight: 800;
    }

    .category-count {
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
      padding-bottom: 4px;
    }

    /* ОДНА КОЛОНКА */
    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .item {
      display: grid;
      grid-template-columns: 150px 1fr;
      gap: 18px;
      align-items: center;
      min-height: 174px;
      padding: 16px;
      border-radius: var(--radius);
      border: 1px solid rgba(255,255,255,.06);
      background:
        radial-gradient(circle at 100% 0%, rgba(242,163,0,.10), transparent 30%),
        var(--panel);
      box-shadow: var(--shadow);
    }

    .item.no-photo {
      grid-template-columns: 1fr;
      min-height: auto;
    }

    .photo-wrap {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid var(--accent);
      background:
        radial-gradient(circle at 30% 25%, #5b5b5b, #2b2b2b 60%, #151515 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 8px 22px rgba(0,0,0,.35);
    }

    .photo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .photo-placeholder {
      color: rgba(255,255,255,.78);
      text-align: center;
      font-size: 13px;
      line-height: 1.25;
      padding: 10px;
    }

    .dots {
      display: flex;
      gap: 5px;
      margin-bottom: 8px;
    }

    .dots i {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: block;
      background: var(--accent);
    }

    .badge {
      display: inline-block;
      margin: 0 0 8px;
      border-radius: 999px;
      background: var(--accent);
      color: #171717;
      padding: 5px 9px;
      font-size: 11px;
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: .05em;
      font-weight: 700;
    }

    .item-title {
      margin: 0;
      font-size: 22px;
      line-height: 1.05;
      font-weight: 700;
    }

    .item-desc {
      margin: 7px 0 12px;
      color: #d8d8d8;
      font-size: 14px;
      line-height: 1.4;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 14px;
      align-items: baseline;
    }

    .weight {
      color: var(--muted);
      font-size: 14px;
    }

    .price {
      color: #fff;
      font-size: 21px;
      line-height: 1;
      font-weight: 800;
      white-space: nowrap;
    }

    .empty,
    .error-box {
      margin-top: 16px;
      padding: 24px 18px;
      border-radius: 22px;
      text-align: center;
      color: var(--muted);
      background: rgba(0,0,0,.28);
      border: 1px dashed rgba(255,255,255,.16);
      line-height: 1.45;
    }

    .error-box strong {
      color: var(--accent);
    }

    .top-btn {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 40;
      width: 48px;
      height: 48px;
      border: 0;
      border-radius: 50%;
      background: var(--accent);
      color: #171717;
      font-size: 22px;
      cursor: pointer;
      display: none;
      box-shadow: var(--shadow);
    }

    .top-btn.visible {
      display: block;
    }

    @media (max-width: 620px) {
      .page {
        width: min(100% - 16px, var(--max));
      }

      .item {
        grid-template-columns: 118px 1fr;
        gap: 14px;
        padding: 12px;
        min-height: 146px;
      }

      .item.no-photo {
        grid-template-columns: 1fr;
        min-height: auto;
      }

      .photo-wrap {
        width: 118px;
        height: 118px;
      }

      .item-title {
        font-size: 19px;
      }

      .category-head {
        flex-direction: column;
        align-items: flex-start;
        gap: 4px;
      }

      .category-count {
        padding-bottom: 0;
      }
    }

    @media (max-width: 420px) {
      .item {
        grid-template-columns: 1fr;
      }

      .photo-wrap {
        width: 128px;
        height: 128px;
      }

      .item.no-photo {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero" id="top">
      <h1 class="hero-title">МЕНЮ</h1>
      <p class="hero-subtitle">Парк Історії Землі</p>
    </section>

    <div class="toolbar-wrap">
      <nav class="tabs" id="tabs" aria-label="Категорії меню"></nav>
    </div>

    <div class="status" id="status">
      <span>Завантаження меню...</span>
    </div>

    <section id="menuRoot"></section>
  </main>

  <button class="top-btn" id="topBtn" type="button" aria-label="Нагору">↑</button>

  <script>
    const SHEET_ID = "1GZerl_j73IJE7HO3VSS1w3PXCdqSjvjRkjtlyrNdJ0Q";
    const SHEET_GID = "0";

    const state = {
      items: [],
      filtered: [],
      categories: [],
      activeCategory: "Усе",
      updatedAt: null
    };

    const els = {
      tabs: document.getElementById("tabs"),
      menuRoot: document.getElementById("menuRoot"),
      status: document.getElementById("status"),
      topBtn: document.getElementById("topBtn")
    };

    const NO_PHOTO_CATEGORIES = ["міцні напої"];

    function loadGoogleSheet() {
      return new Promise((resolve, reject) => {
        const previousGoogle = window.google;
        const script = document.createElement("script");
        const timeout = window.setTimeout(() => {
          cleanup();
          reject(new Error("Google Sheets довго не відповідає"));
        }, 12000);

        function cleanup() {
          window.clearTimeout(timeout);
          script.remove();
          if (previousGoogle === undefined) {
            try { delete window.google; } catch (e) { window.google = undefined; }
          } else {
            window.google = previousGoogle;
          }
        }

        window.google = window.google || {};
        window.google.visualization = window.google.visualization || {};
        window.google.visualization.Query = {
          setResponse: data => {
            cleanup();
            if (!data || data.status === "error") {
              const message = data?.errors?.[0]?.detailed_message || data?.errors?.[0]?.message || "Помилка читання таблиці";
              reject(new Error(message));
              return;
            }
            resolve(data);
          }
        };

        script.onerror = () => {
          cleanup();
          reject(new Error("Не вдалося підключитися до Google Sheets"));
        };

        script.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?gid=${SHEET_GID}&tqx=out:json&_=${Date.now()}`;
        document.head.appendChild(script);
      });
    }

    function tableToRows(table) {
      const headers = table.cols.map((col, index) => String(col.label || col.id || `Колонка ${index + 1}`).trim());
      return table.rows.map(row => {
        const object = {};
        headers.forEach((header, index) => {
          const cell = row.c[index];
          object[header] = cell ? (cell.f ?? cell.v ?? "") : "";
        });
        return object;
      });
    }

    function getValue(row, names) {
      for (const name of names) {
        if (Object.prototype.hasOwnProperty.call(row, name)) {
          return String(row[name] ?? "").trim();
        }
      }
      return "";
    }

    function normalize(row, index) {
      return {
        category: getValue(row, ["Категорія", "Category", "Розділ"]) || "Інше",
        name: getValue(row, ["Назва", "Name", "Позиція"]),
        description: getValue(row, ["Опис", "Description", "Склад"]),
        weight: getValue(row, ["Вага", "Об'єм", "Обєм", "Weight", "Volume"]),
        price: formatPrice(getValue(row, ["Ціна", "Price", "Вартість"])),
        photo: getValue(row, ["Фото", "Photo", "Image", "Зображення"]),
        status: getValue(row, ["Статус", "Status", "Активно"]).toLowerCase(),
        popular: ["так", "yes", "1", "true", "+", "хіт", "hit"].includes(
          getValue(row, ["Популярне", "Popular", "Хіт"]).toLowerCase()
        ),
        order: Number(String(getValue(row, ["Порядок", "Order", "Сортування"])).replace(",", ".")) || index + 1
      };
    }

    function formatPrice(value) {
      const raw = String(value || "").trim();
      if (!raw) return "";
      if (/грн|₴|uah/i.test(raw)) return raw;
      return raw + " грн";
    }

    async function loadMenu() {
      try {
        setStatus("Завантаження меню...");
        els.menuRoot.innerHTML = "";

        const data = await loadGoogleSheet();
        const rows = tableToRows(data.table);

        const items = rows
          .map(normalize)
          .filter(item => item.name)
          .filter(item => !["ні", "нет", "no", "false", "0", "hidden", "inactive", "вимкнено"].includes(item.status))
          .sort((a, b) => a.order - b.order || a.name.localeCompare(b.name, "uk"));

        state.items = items;
        state.categories = ["Усе", ...Array.from(new Set(items.map(item => item.category)))];
        state.activeCategory = state.categories.includes(state.activeCategory) ? state.activeCategory : "Усе";
        state.updatedAt = new Date();

        render();
      } catch (error) {
        console.error(error);
        setStatus("Не вдалося завантажити меню.");
        els.menuRoot.innerHTML = `
          <div class="error-box">
            <strong>Меню не завантажилось.</strong><br>
            Перевір доступ до таблиці і назви колонок.
          </div>
        `;
      }
    }

    function setStatus(text) {
      els.status.innerHTML = `<span>${escapeHTML(text)}</span>`;
    }

    function applyFilters() {
      state.filtered = state.items.filter(item => {
        return state.activeCategory === "Усе" || item.category === state.activeCategory;
      });
    }

    function render() {
      applyFilters();
      renderTabs();
      renderStatus();
      renderMenu();
    }

    function renderTabs() {
      els.tabs.innerHTML = state.categories.map(category => `
        <button class="tab ${category === state.activeCategory ? "active" : ""}" type="button" data-category="${escapeAttr(category)}">
          ${escapeHTML(category)}
        </button>
      `).join("");
    }

    function renderStatus() {
      const time = state.updatedAt
        ? state.updatedAt.toLocaleString("uk-UA", { dateStyle: "short", timeStyle: "short" })
        : "—";

      els.status.innerHTML = `
        <span><strong>${state.filtered.length}</strong> з ${state.items.length} позицій</span>
        <span>Оновлено: ${time}</span>
      `;
    }

    function renderMenu() {
      if (!state.filtered.length) {
        els.menuRoot.innerHTML = `<div class="empty">Нічого не знайдено.</div>`;
        return;
      }

      const grouped = groupByCategory(state.filtered);

      els.menuRoot.innerHTML = Object.entries(grouped).map(([category, items]) => `
        <section class="category" id="cat-${slug(category)}">
          <div class="category-head">
            <h2 class="category-title">${escapeHTML(category)}</h2>
            <div class="category-count">${items.length} позицій</div>
          </div>
          <div class="grid">
            ${items.map(renderItem).join("")}
          </div>
        </section>
      `).join("");
    }

    function renderItem(item) {
      const showPhoto = !NO_PHOTO_CATEGORIES.includes(normalizeText(item.category));

      return `
        <article class="item ${showPhoto ? "" : "no-photo"}">
          ${showPhoto ? `
            <div class="photo-wrap">
              ${item.photo
                ? `<img src="${escapeAttr(item.photo)}" alt="${escapeAttr(item.name)}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=&quot;photo-placeholder&quot;>Фото<br>страви</div>'">`
                : `<div class="photo-placeholder">Фото<br>страви</div>`
              }
            </div>
          ` : ""}

          <div class="item-content">
            <div class="dots"><i></i><i></i><i></i></div>
            ${item.popular ? `<div class="badge">Хіт</div>` : ""}
            <h3 class="item-title">${escapeHTML(item.name)}</h3>
            ${item.description ? `<p class="item-desc">${escapeHTML(item.description)}</p>` : ""}
            <div class="meta">
              ${item.weight ? `<span class="weight">${escapeHTML(item.weight)}</span>` : ""}
              ${item.price ? `<span class="price">${escapeHTML(item.price)}</span>` : ""}
            </div>
          </div>
        </article>
      `;
    }

    function normalizeText(value) {
      return String(value || "")
        .trim()
        .toLowerCase()
        .replace(/\s+/g, " ");
    }

    function groupByCategory(items) {
      return items.reduce((acc, item) => {
        if (!acc[item.category]) acc[item.category] = [];
        acc[item.category].push(item);
        return acc;
      }, {});
    }

    function slug(value) {
      return String(value)
        .toLowerCase()
        .trim()
        .replace(/[^a-zа-яіїєґ0-9]+/gi, "-")
        .replace(/^-+|-+$/g, "");
    }

    function escapeHTML(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttr(value) {
      return escapeHTML(value).replaceAll("`", "&#096;");
    }

    els.tabs.addEventListener("click", event => {
      const button = event.target.closest(".tab");
      if (!button) return;
      state.activeCategory = button.dataset.category;
      render();
      window.scrollTo({
        top: document.querySelector(".toolbar-wrap").offsetTop,
        behavior: "smooth"
      });
    });

    els.topBtn.addEventListener("click", () => {
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    window.addEventListener("scroll", () => {
      els.topBtn.classList.toggle("visible", window.scrollY > 420);
    });

    loadMenu();
  </script>
</body>
</html>
